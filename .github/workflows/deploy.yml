name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Verify no inline scripts in output
        run: |
          echo "Checking for inline script injection in generated HTML..."
          FOUND=$(grep -rn '<script[^>]*>[^<]' _site/ --include="*.html" \
            | grep -v 'src=' \
            | grep -v 'jtd.onReady' \
            | grep -v 'initSearch' \
            | grep -v '"baseurl"' \
            || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Unexpected inline scripts detected in generated HTML:"
            echo "$FOUND"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
