site_name: DistTopic
site_description: >-
  Open source tools for game development — building cross-platform editors
  and servers for the Tibia community.
site_url: https://disttopic.github.io

repo_url: https://github.com/DistTopic/disttopic.github.io
repo_name: disttopic.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  language: en

  palette:
    - scheme: slate
      primary: custom
      accent: custom

  font: false  # Use system fonts — no Google Fonts (keeps CSP strict)

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-\._]+'

extra_css:
  - assets/css/github-dark.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Projects:
      - projects/index.md
      - Assets And Map Editor: projects/assets-and-map-editor.md
  - Guides:
      - guides/index.md
      - Adding & Editing Pages: guides/adding-pages.md
      - Security Practices: guides/security.md
  - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DistTopic
      name: DistTopic on GitHub
  generator: false

copyright: >-
  &copy; 2026 DistTopic &mdash;
  <a href="https://github.com/DistTopic/disttopic.github.io/blob/main/LICENSE">MIT License</a>
